name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
      - name: Lint syntax
        run: |
          .venv/bin/python -m py_compile src/real_qa/build.py src/real_qa/pipeline.py scripts/qa_cli.py scripts/evaluate_real_qa.py scripts/run_real_qa.py
      - name: Run tests
        run: |
          .venv/bin/python -m pytest -q
